version: '3.8'

services:
  backend:
    build: ./backend
    container_name: jobtracker-backend
    ports:
      - "8080:8080"
    networks:
      - jobtracker-network

  frontend:
    build: ./frontend
    container_name: jobtracker-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - jobtracker-network

networks:
  jobtracker-network:
    driver: bridge
